<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="墨流し">
  <!-- 家族の文法：rx=14 の角丸ダーク四角。夜の墨流しは少し藍を帯びた黒 -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#0f1116"/>
  <!-- 一滴の墨（水面に落ちる） -->
  <circle cx="32" cy="17.5" r="4.2" fill="#ffffff"/>
  <!-- 水中へ拡散していく墨（下へ広がり、薄れて消える） -->
  <ellipse cx="32" cy="29" rx="9.5"  ry="6.5" fill="#cdd6ff" opacity="0.48"/>
  <ellipse cx="32" cy="38" rx="14.5" ry="8.5" fill="#cdd6ff" opacity="0.26"/>
  <ellipse cx="32" cy="47" rx="19"   ry="9.5" fill="#cdd6ff" opacity="0.13"/>
</svg>
